<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Incremental Game</title>
</head>
<body>

    <div id="start-menu">
        <div class="menu-title">THE INCREMENTAL GAME</div>
        <div class="menu-sub">A 3D Open World Adventure</div>
        <button id="start-btn">START</button>
        <div id="patch-notes"></div>
    </div>

    <style>
        body {
            background: linear-gradient(135deg, #232946 0%, #393e46 100%);
            min-height: 100vh;
        }
        #start-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 2.5rem 3.5rem 2rem 3.5rem;
            border-radius: 1.2rem;
            box-shadow: 0 0 40px #000a;
            text-align: center;
            min-width: 340px;
            animation: fadein 1.2s cubic-bezier(.42,0,.58,1);
        }
        .menu-title {
            font-size: 2.3rem;
            font-weight: bold;
            letter-spacing: 0.08em;
            color: #fff;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 16px #6c63ff88, 0 1px 0 #222;
        }
        .menu-sub {
            font-size: 1.1rem;
            color: #b8b8ff;
            margin-bottom: 2.2rem;
            letter-spacing: 0.04em;
        }
        #start-btn {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(90deg, #6c63ff 0%, #b8b8ff 100%);
            border: none;
            border-radius: 0.7rem;
            padding: 0.8rem 2.8rem;
            margin-bottom: 1.7rem;
            box-shadow: 0 2px 12px #6c63ff44;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        #start-btn:hover {
            background: linear-gradient(90deg, #b8b8ff 0%, #6c63ff 100%);
            transform: scale(1.04);
        }
        #patch-notes {
            font-size: 0.95rem;
            color: #e0e0ff;
            margin-top: 1.2rem;
            text-align: left;
            max-width: 340px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(60,60,80,0.18);
            border-radius: 0.5rem;
            padding: 0.7rem 1rem 0.5rem 1rem;
            box-shadow: 0 1px 6px #0002;
        }
        @keyframes fadein {
            from { opacity: 0; transform: translate(-50%, -60%) scale(0.98); }
            to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
