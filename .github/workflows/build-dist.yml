# build-dist.yml
# Rebuilds the dist/ folder and commits it back on every push.
# Skips if pusher is github-actions[bot] to prevent infinite loop + rebase conflicts.

name: Build and Update dist

on:
  push:
    branches:
      - '**'

# needs write access to push the updated dist/ back
permissions:
  contents: write

jobs:
  build-and-commit:
    name: npm run build then commit dist
    # dont run if pusher is the CI bot -- that causes infinite loop and rebase conflicts
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the project (show full output)
        run: npm run build

      - name: Commit updated dist/ if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          if git diff --staged --quiet; then
            echo "dist/ is already up to date, nothing to commit"
          else
            git commit -m "chore: rebuild dist/ [skip ci]"
            git push
          fi

