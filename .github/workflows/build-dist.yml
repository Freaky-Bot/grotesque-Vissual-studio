# build-dist.yml
# Automatically rebuilds the dist/ folder and commits it back to the branch
# on every push. This catches cases where someone pushed without running
# npm run build locally (e.g. forgot, or pushed from another machine).
# The commit message includes [skip ci] to stop infinite loops.

name: Build and Update dist

on:
  push:
    branches:
      - '**'   # all branches -- rebuild everywhere

# needs write access to push the updated dist/ back
permissions:
  contents: write

jobs:
  build-and-commit:
    name: npm run build → commit dist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # fetch the full history so git push doesn't complain
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the project (show full output)
        run: npm run build

      - name: Commit updated dist/ if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          # only commit if dist actually changed -- avoids empty commits
          if git diff --staged --quiet; then
            echo "dist/ is already up to date, nothing to commit"
          else
            git commit -m "chore: rebuild dist/ [skip ci]"
            git push
          fi
